<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>Tedarikçi Ödeme Takip</title>
<link rel="manifest" href="manifest.json">
<style>
  :root {
    --bg: #0f0f1a; --surface: #1a1a2e; --card: #16213e; --border: #2a2a4a;
    --accent: #e94560; --green: #00c896; --yellow: #f5a623;
    --text: #e8e8f0; --muted: #8888aa; --radius: 14px; --nav-h: 64px; --header-h: 56px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
  #app { display: flex; flex-direction: column; height: 100%; }
  #header { background: var(--surface); border-bottom: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; }
  #header-top { height: var(--header-h); display: flex; align-items: center; padding: 0 16px; gap: 10px; }
  #header-top h1 { font-size: 16px; font-weight: 700; flex: 1; }
  #header-top .badge { background: var(--accent); color: #fff; font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 700; }
  #header-top .sync-icon { font-size: 16px; cursor: pointer; opacity: 0.7; padding: 4px; flex-shrink: 0; }
  #header-actions { display: flex; gap: 6px; padding: 0 12px 8px; overflow-x: auto; -webkit-overflow-scrolling: touch; }
  #header-actions::-webkit-scrollbar { display: none; }
  #content { flex: 1; overflow-y: auto; overflow-x: hidden; -webkit-overflow-scrolling: touch; padding-bottom: calc(var(--nav-h) + 8px); }
  #nav { background: var(--surface); border-top: 1px solid var(--border); height: var(--nav-h); display: flex; align-items: center; flex-shrink: 0; }
  .nav-btn { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 4px; cursor: pointer; padding: 8px 0; color: var(--muted); transition: color 0.2s; border: none; background: none; font-size: 10px; font-weight: 600; letter-spacing: 0.5px; }
  .nav-btn.active { color: var(--accent); }
  .nav-btn svg { width: 22px; height: 22px; }
  .card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin: 8px 12px; }
  .card-title { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .supplier-item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin: 6px 12px; cursor: pointer; }
  .supplier-avatar { width: 38px; height: 38px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 14px; flex-shrink: 0; }
  .supplier-info { flex: 1; min-width: 0; }
  .supplier-name { font-weight: 700; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .supplier-cat { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .supplier-amount { text-align: right; flex-shrink: 0; }
  .supplier-amount .borç { font-size: 15px; font-weight: 800; color: var(--accent); }
  .supplier-amount .ödenen { font-size: 11px; color: var(--green); margin-top: 2px; }
  .progress-bar { height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; margin: 5px 0 2px; }
  .progress-fill { height: 100%; background: linear-gradient(90deg, var(--green), #00e0a0); border-radius: 2px; transition: width 0.4s; }
  .view-tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); }
  .view-tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; cursor: pointer; color: var(--muted); border-bottom: 2px solid transparent; transition: all 0.2s; }
  .view-tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .nav-arrows { display: flex; align-items: center; justify-content: space-between; padding: 10px 16px 6px; }
  .nav-arrows .period-label { font-size: 15px; font-weight: 700; }
  .arrow-btn { background: var(--card); border: 1px solid var(--border); border-radius: 8px; color: var(--text); width: 34px; height: 34px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 16px; }
  .payment-row { display: flex; align-items: center; gap: 10px; padding: 11px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin: 4px 12px; cursor: pointer; }
  .dot { width: 10px; height: 10px; border-radius: 50%; flex-shrink: 0; }
  .dot.paid { background: var(--green); }
  .dot.unpaid { background: var(--yellow); }
  .pamt { font-size: 14px; font-weight: 800; color: var(--yellow); }
  .status-badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 700; flex-shrink: 0; }
  .status-badge.paid { background: rgba(0,200,150,0.15); color: var(--green); }
  .status-badge.unpaid { background: rgba(233,69,96,0.15); color: var(--accent); }
  .week-grid { padding: 8px 12px; }
  .week-day-card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 10px 12px; margin-bottom: 8px; }
  .week-day-card.today { border-color: var(--accent); }
  .week-day-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .week-day-name { font-size: 12px; color: var(--muted); font-weight: 600; }
  .week-day-date { font-size: 13px; font-weight: 800; }
  .week-total { font-size: 13px; font-weight: 800; color: var(--yellow); }
  .week-payment-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 8px; background: var(--bg); border-radius: 8px; margin-top: 4px; cursor: pointer; }
  .month-cal { padding: 8px 12px; }
  .month-header-row { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; margin-bottom: 3px; }
  .month-dow { text-align: center; font-size: 10px; color: var(--muted); font-weight: 700; padding: 3px 0; }
  .month-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 3px; }
  .month-cell { aspect-ratio: 1; background: var(--card); border: 1px solid var(--border); border-radius: 8px; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; position: relative; font-size: 12px; font-weight: 600; }
  .month-cell.other-month { opacity: 0.3; }
  .month-cell.today { border-color: var(--accent); color: var(--accent); }
  .month-cell .cell-dot { width: 5px; height: 5px; background: var(--yellow); border-radius: 50%; position: absolute; bottom: 4px; }
  .month-cell.has-payment { background: rgba(245,166,35,0.1); }
  .month-cell.selected-day { background: var(--accent); color: #fff; border-color: var(--accent); }
  .month-cell.selected-day .cell-dot { background: #fff; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 100; display: flex; align-items: flex-end; backdrop-filter: blur(4px); }
  .modal { background: var(--surface); border-radius: 20px 20px 0 0; padding: 20px; width: 100%; max-height: 88vh; overflow-y: auto; }
  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 16px; font-weight: 800; margin-bottom: 16px; }
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; color: var(--muted); font-weight: 600; margin-bottom: 6px; display: block; }
  .form-input { width: 100%; background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; color: var(--text); font-size: 14px; outline: none; }
  .form-input:focus { border-color: var(--accent); }
  select.form-input { appearance: none; }
  .btn { padding: 14px; border-radius: 12px; font-size: 15px; font-weight: 700; cursor: pointer; border: none; width: 100%; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-secondary { background: var(--card); color: var(--text); border: 1px solid var(--border); margin-top: 8px; }
  .btn-danger { background: rgba(233,69,96,0.2); color: var(--accent); border: 1px solid var(--accent); margin-top: 8px; }
  .fab { position: fixed; bottom: calc(var(--nav-h) + 16px); right: 16px; width: 52px; height: 52px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; box-shadow: 0 4px 20px rgba(233,69,96,0.5); z-index: 50; border: none; color: #fff; font-size: 24px; }
  .empty { text-align: center; padding: 48px 24px; color: var(--muted); }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
  .empty-text { font-size: 14px; line-height: 1.5; }
  .detail-section { margin: 8px 12px; }
  .detail-section h3 { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; padding: 10px 0 6px; }
  .detail-payment-row { display: flex; align-items: center; gap: 10px; padding: 12px 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 6px; cursor: pointer; }
  .chip { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
  .chip.green { background: rgba(0,200,150,0.15); color: var(--green); }
  .chip.red { background: rgba(233,69,96,0.15); color: var(--accent); }
  .tek-badge { font-size: 9px; color: var(--muted); background: #2a2a4a; padding: 1px 5px; border-radius: 6px; margin-left: 5px; }
  .toast { position: fixed; top: 16px; left: 50%; transform: translateX(-50%); background: #222; color: #fff; padding: 10px 20px; border-radius: 20px; font-size: 13px; font-weight: 600; z-index: 200; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }
  .toast.show { opacity: 1; }
  .loading-overlay { position: fixed; inset: 0; background: var(--bg); z-index: 300; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 16px; }
  .spinner { width: 40px; height: 40px; border: 3px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .loading-text { font-size: 13px; color: var(--muted); }
  .free-wrap { display: none; margin-top: 8px; }
  .add-list-row { display: none; margin-top: 8px; align-items: center; gap: 10px; padding: 10px 12px; background: var(--bg); border-radius: 10px; }
  .add-list-row.show { display: flex; }
  .add-list-row label { font-size: 12px; color: var(--text); cursor: pointer; }
  .section-lbl { padding: 8px 12px 4px; font-size: 12px; color: var(--muted); font-weight: 700; text-transform: uppercase; letter-spacing: 1px; margin-top: 4px; }
  .partial-bar-wrap { margin: 4px 0 2px; }
  .partial-bar { height: 5px; background: var(--border); border-radius: 3px; overflow: hidden; }
  .partial-fill { height: 100%; background: linear-gradient(90deg, #f5a623, #ffcc66); border-radius: 3px; transition: width 0.4s; }
  .partial-info { display: flex; justify-content: space-between; font-size: 10px; margin-top: 3px; }
  .partial-paid { color: var(--green); font-weight: 700; }
  .partial-remaining { color: var(--accent); font-weight: 700; }
  .btn-partial { background: rgba(245,166,35,0.15); color: var(--yellow); border: 1px solid rgba(245,166,35,0.4); border-radius: 10px; padding: 11px; font-size: 13px; font-weight: 700; cursor: pointer; width: 100%; margin-top: 8px; }
  .report-btn { background: rgba(0,200,150,0.15); color: var(--green); border: 1px solid rgba(0,200,150,0.3); border-radius: 8px; padding: 5px 10px; font-size: 11px; font-weight: 700; cursor: pointer; white-space: nowrap; }
  .report-modal-btn { display: flex; align-items: center; gap: 12px; padding: 14px; background: var(--card); border: 1px solid var(--border); border-radius: 12px; margin-bottom: 10px; cursor: pointer; width: 100%; text-align: left; }
  .report-modal-btn:active { border-color: var(--green); }
  .report-icon { font-size: 26px; flex-shrink: 0; }
  .report-name { font-size: 14px; font-weight: 700; color: var(--text); }
  .import-zone { border: 2px dashed var(--border); border-radius: 12px; padding: 28px 16px; text-align: center; cursor: pointer; transition: border-color 0.2s; margin-bottom: 14px; }
  .import-zone:hover { border-color: var(--yellow); }
  .import-zone input { display: none; }
  .import-zone .iz-icon { font-size: 36px; margin-bottom: 8px; }
  .import-zone .iz-text { font-size: 13px; color: var(--muted); }
  .import-zone .iz-sub { font-size: 11px; color: var(--muted); margin-top: 4px; opacity: 0.6; }
  .import-preview { background: var(--card); border: 1px solid var(--border); border-radius: 10px; padding: 12px 14px; margin-bottom: 12px; }
  .import-preview .ip-row { display: flex; justify-content: space-between; font-size: 12px; padding: 3px 0; }
  .import-preview .ip-label { color: var(--muted); }
  .import-preview .ip-val { font-weight: 700; color: var(--text); }
  .import-opt { display: flex; gap: 8px; margin-bottom: 14px; }
  .import-opt-btn { flex: 1; padding: 10px 8px; border-radius: 10px; font-size: 12px; font-weight: 700; cursor: pointer; border: 2px solid var(--border); background: var(--card); color: var(--muted); text-align: center; transition: all 0.2s; }
  .import-opt-btn.selected { border-color: var(--yellow); color: var(--yellow); background: rgba(245,166,35,0.1); }
  .report-desc { font-size: 11px; color: var(--muted); margin-top: 2px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="header-top">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 7V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v2"/></svg>
      <h1>Tedarikçi Takip</h1>
      <span class="badge" id="total-badge">...</span>
      <span class="sync-icon" onclick="loadAll()" title="Yenile">↻</span>
    </div>
    <div id="header-actions">
      <button class="report-btn" onclick="openReportModal()">📊 Rapor</button>
      <button class="report-btn" style="background:rgba(245,166,35,0.15);color:var(--yellow);border-color:rgba(245,166,35,0.3)" onclick="openImportModal()">📥 İçe Aktar</button>
      <button class="report-btn" style="background:rgba(233,69,96,0.15);color:var(--accent);border-color:rgba(233,69,96,0.3)" onclick="openResetModal()">🗑️ Sıfırla</button>
    </div>
  </div>
  <div id="content"></div>
  <nav id="nav">
    <button class="nav-btn active" onclick="switchTab('dashboard')" id="tab-dashboard">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>ÖZET
    </button>
    <button class="nav-btn" onclick="switchTab('suppliers')" id="tab-suppliers">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>TEDARİKÇİ
    </button>
    <button class="nav-btn" onclick="switchTab('calendar')" id="tab-calendar">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>TAKVİM
    </button>
    <button class="nav-btn" onclick="switchTab('payments')" id="tab-payments">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>ÖDEMELER
    </button>
  </nav>
</div>
<div class="toast" id="toast"></div>
<div class="loading-overlay" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">Veriler yükleniyor...</div>
</div>

<script>
// ==================== SUPABASE CONFIG ====================
const SB_URL = 'https://vjvivwfggqnyioosztgj.supabase.co';
const SB_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZqdml2d2ZnZ3FueWlvb3N6dGdqIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODIyOTg2MTgsImV4cCI6MjA5Nzg3NDYxOH0.vEYH0qJ_dlxKU5A5pTq8GXrod-JUnei0JSwGu_gBa_w';

async function sbFetch(path, opts = {}) {
  const res = await fetch(SB_URL + '/rest/v1/' + path, {
    ...opts,
    headers: {
      'apikey': SB_KEY,
      'Authorization': 'Bearer ' + SB_KEY,
      'Content-Type': 'application/json',
      'Prefer': opts.prefer || 'return=representation',
      ...(opts.headers || {})
    }
  });
  if (!res.ok) {
    const err = await res.text();
    throw new Error(err);
  }
  const text = await res.text();
  return text ? JSON.parse(text) : null;
}

const api = {
  getSuppliers: () => sbFetch('suppliers?order=id'),
  getPayments:  () => sbFetch('payments?select=*&order=date.desc,id.desc'),
  addSupplier:  (d) => sbFetch('suppliers', { method: 'POST', body: JSON.stringify(d) }),
  updateSupplier:(id, d) => sbFetch(`suppliers?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(d) }),
  deleteSupplier:(id) => sbFetch(`suppliers?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal', headers: { 'Prefer': 'return=minimal' } }),
  addPayment:   (d) => sbFetch('payments', { method: 'POST', body: JSON.stringify(d) }),
  updatePayment:(id, d) => sbFetch(`payments?id=eq.${id}`, { method: 'PATCH', body: JSON.stringify(d) }),
  deletePayment:(id) => sbFetch(`payments?id=eq.${id}`, { method: 'DELETE', prefer: 'return=minimal', headers: { 'Prefer': 'return=minimal' } }),
};

// ==================== STATE ====================
let DB = { suppliers: [], payments: [] };
let currentTab = 'dashboard';
let calView = 'daily';
let calDate = new Date();
let selectedSupplierId = null;
let selectedMonthDay = null;

const TR_DAYS_FULL = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
const TR_MONTHS = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
const TR_DAYS_SHORT = ['Paz','Pzt','Sal','Çar','Per','Cum','Cmt'];

function fmt(n) { return '₺' + Number(n).toLocaleString('tr-TR'); }
function dateStr(d) { const y=d.getFullYear(); const m=String(d.getMonth()+1).padStart(2,'0'); const dd=String(d.getDate()).padStart(2,'0'); return `${y}-${m}-${dd}`; }
function parseDate(s) { if (!s) return new Date(); const [y,m,d] = s.split('-').map(Number); return new Date(y, m-1, d); }
function sameDay(a, b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
function getSupplier(id) { return DB.suppliers.find(s => s.id == id); }
function supplierInitials(name) { return (name||'?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase(); }
function totalDebt() { return DB.suppliers.reduce((s,x) => s + (x.total_debt - x.paid), 0); }
function totalPaid() { return DB.suppliers.reduce((s,x) => s + x.paid, 0); }
function scheduledUnpaid() { return DB.payments.filter(p=>p.status==='unpaid').reduce((s,p)=>s+p.amount,0); }
function getPaymentName(p) { if (p.supplier_id) { const s = getSupplier(p.supplier_id); if (s) return s.name; } return p.free_supplier_name || '?'; }
function getPaymentColor(p) { if (p.supplier_id) { const s = getSupplier(p.supplier_id); if (s) return s.color; } return '#8888aa'; }
function getPaymentsForDate(d) { const ds = dateStr(d); return DB.payments.filter(p => p.date === ds); }
function getWeekStart(d) { const date = new Date(d); const day = date.getDay(); const diff = day === 0 ? -6 : 1 - day; date.setDate(date.getDate() + diff); return date; }

function showToast(msg, dur = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}
function showLoading(msg) {
  const l = document.getElementById('loading');
  l.querySelector('.loading-text').textContent = msg || 'İşlem yapılıyor...';
  l.style.display = 'flex';
}
function hideLoading() { document.getElementById('loading').style.display = 'none'; }

// ==================== DATA LOAD ====================
async function loadAll() {
  showLoading('Veriler yükleniyor...');
  try {
    const [suppliers, payments] = await Promise.all([api.getSuppliers(), api.getPayments()]);
    DB.suppliers = suppliers || [];
    DB.payments = payments || [];
    render();
  } catch(e) {
    showToast('Bağlantı hatası: ' + e.message, 4000);
    render();
  } finally {
    hideLoading();
  }
}

// ==================== TABS ====================
function switchTab(tab) {
  currentTab = tab;
  if (tab !== 'suppliers') selectedSupplierId = null;
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + tab).classList.add('active');
  render();
}

function render() {
  const content = document.getElementById('content');
  const debt = totalDebt();
  document.getElementById('total-badge').textContent = fmt(debt);
  switch(currentTab) {
    case 'dashboard': content.innerHTML = renderDashboard(); break;
    case 'suppliers': content.innerHTML = selectedSupplierId ? renderSupplierDetail(selectedSupplierId) : renderSuppliers(); break;
    case 'calendar':  content.innerHTML = renderCalendar(); break;
    case 'payments':  content.innerHTML = renderPayments(); break;
  }
  let fab = document.querySelector('.fab');
  if (!fab) { fab = document.createElement('button'); fab.className = 'fab'; fab.innerHTML = '+'; document.body.appendChild(fab); }

// ==================== CALENDAR ====================
function renderCalendar() {
  let html = `<div class="view-tabs">
    <div class="view-tab ${calView==='daily'?'active':''}" onclick="calView='daily';selectedMonthDay=null;render()">Günlük</div>

  else html += renderMonthlyView();
  return html;
}

function renderDailyView() {
  const payments = getPaymentsForDate(calDate);
  const label = `${calDate.getDate()} ${TR_MONTHS[calDate.getMonth()]} ${calDate.getFullYear()} · ${TR_DAYS_FULL[calDate.getDay()]}`;

  let html = `<div class="nav-arrows">
    <button class="arrow-btn" onclick="calDate=new Date(calDate);calDate.setDate(calDate.getDate()-1);render()">‹</button>
    <div style="text-align:center"><div class="period-label">${label}</div>${total>0?`<div style="font-size:12px;color:var(--yellow);margin-top:2px">${fmt(total)}</div>`:''}</div>
    <button class="arrow-btn" onclick="calDate=new Date(calDate);calDate.setDate(calDate.getDate()+1);render()">›</button>
  </div>`;
  if (payments.length === 0) {
    html += `<div class="empty"><div class="empty-icon">📅</div><div class="empty-text">Bu gün için ödeme planı yok<br><small style="color:var(--muted)">+ ile ekle</small></div></div>`;
  } else {
    payments.forEach(p => {
      const name = getPaymentName(p); const color = getPaymentColor(p);
      const isFree = !p.supplier_id;
      html += `<div class="payment-row" onclick="openEditPayment(${p.id})">
        <div class="dot ${p.status}"></div>
        <div class="supplier-avatar" style="background:${color}22;color:${color};width:32px;height:32px;font-size:11px;border-radius:8px">${supplierInitials(name)}</div>
        <div style="flex:1"><div style="font-size:13px;font-weight:700">${name}${isFree?'<span class="tek-badge">tek seferlik</span>':''}</div><div style="font-size:11px;color:var(--muted)">${p.note||'—'}</div></div>
        <div style="text-align:right"><div class="pamt">${fmt(p.amount)}</div><span class="status-badge ${p.status}">${p.status==='paid'?'Ödendi':'Bekliyor'}</span></div>
      </div>`;
    });
  }
  const today = new Date(); today.setHours(0,0,0,0); const cd = new Date(calDate); cd.setHours(0,0,0,0);
  if (cd.getTime() !== today.getTime()) {
    html += `<div style="text-align:center;padding:16px"><button onclick="calDate=new Date();render()" style="background:var(--card);border:1px solid var(--border);border-radius:8px;color:var(--muted);padding:8px 16px;font-size:12px;cursor:pointer">Bugüne Git</button></div>`;
  }
  return html;
}

function renderWeeklyView() {
  const ws = getWeekStart(new Date(calDate));
  const we = new Date(ws); we.setDate(we.getDate()+6);
  const label = `${ws.getDate()} ${TR_MONTHS[ws.getMonth()]} – ${we.getDate()} ${TR_MONTHS[we.getMonth()]}`;
  let weekTotal = 0;
  const days = [];
  for (let i=0;i<7;i++) { const d=new Date(ws); d.setDate(d.getDate()+i); const pays=getPaymentsForDate(d); weekTotal+=pays.reduce((s,p)=>s+p.amount,0); days.push({date:d,payments:pays}); }
  let html = `<div class="nav-arrows">
    <button class="arrow-btn" onclick="calDate=new Date(calDate);calDate.setDate(calDate.getDate()-7);render()">‹</button>
    <div style="text-align:center"><div class="period-label">${label}</div>${weekTotal>0?`<div style="font-size:12px;color:var(--yellow);margin-top:2px">${fmt(weekTotal)} toplam</div>`:''}</div>
    <button class="arrow-btn" onclick="calDate=new Date(calDate);calDate.setDate(calDate.getDate()+7);render()">›</button>
  </div><div class="week-grid">`;
  const today = new Date();
  days.forEach(({date,payments}) => {
    const isToday = sameDay(date, today);
    const dayTotal = payments.reduce((s,p)=>s+p.amount,0);
    html += `<div class="week-day-card ${isToday?'today':''}">
      <div class="week-day-header">
        <div><div class="week-day-name">${TR_DAYS_SHORT[date.getDay()]}</div><div class="week-day-date">${date.getDate()} ${TR_MONTHS[date.getMonth()]}</div></div>
        ${dayTotal>0?`<div class="week-total">${fmt(dayTotal)}</div>`:'<div style="font-size:11px;color:var(--muted)">Ödeme yok</div>'}
      </div>`;
    payments.forEach(p => {
      const name = getPaymentName(p);
      html += `<div class="week-payment-item" onclick="openEditPayment(${p.id})">
        <div style="display:flex;align-items:center;gap:6px"><div class="dot ${p.status}" style="width:7px;height:7px"></div><span style="font-size:12px">${name}${p.note?' · '+p.note:''}</span></div>
        <span style="font-size:12px;font-weight:700;color:var(--yellow)">${fmt(p.amount)}</span>
      </div>`;
    });
    html += `</div>`;
  });
  html += `</div>`;
  return html;
}

function renderMonthlyView() {
  const year = calDate.getFullYear(); const month = calDate.getMonth();
  const label = `${TR_MONTHS[month]} ${year}`;
  const firstDay = new Date(year, month, 1); const lastDay = new Date(year, month+1, 0);
  let startDow = firstDay.getDay(); const offset = startDow===0?6:startDow-1;
  const totalCells = offset + lastDay.getDate(); const rows = Math.ceil(totalCells/7);
  const payMap = {};
  DB.payments.forEach(p => { payMap[p.date] = (payMap[p.date]||0) + p.amount; });
  let html = `<div class="nav-arrows">
    <button class="arrow-btn" onclick="calDate=new Date(calDate.getFullYear(),calDate.getMonth()-1,1);selectedMonthDay=null;render()">‹</button>
    <div class="period-label">${label}</div>
    <button class="arrow-btn" onclick="calDate=new Date(calDate.getFullYear(),calDate.getMonth()+1,1);selectedMonthDay=null;render()">›</button>
  </div>
  <div class="month-cal">
    <div class="month-header-row">${['Pt','Sa','Ça','Pe','Cu','Ct','Pa'].map(d=>`<div class="month-dow">${d}</div>`).join('')}</div>
    <div class="month-grid">`;
  const today = new Date();
  for (let i=0;i<rows*7;i++) {
    const dayNum = i-offset+1; const isCurrentMonth = dayNum>=1 && dayNum<=lastDay.getDate();
    const cellDate = new Date(year,month,dayNum); const ds = dateStr(cellDate);
    const hasPayment = payMap[ds]>0; const isToday = isCurrentMonth && sameDay(cellDate,today);
    const isSelected = isCurrentMonth && selectedMonthDay === ds;
    html += `<div class="month-cell ${!isCurrentMonth?'other-month':''} ${isToday?'today':''} ${hasPayment&&isCurrentMonth?'has-payment':''} ${isSelected?'selected-day':''}"
      onclick="if(${isCurrentMonth?1:0}){selectedMonthDay='${ds}';render()}">
      ${isCurrentMonth?dayNum:''}
      ${hasPayment&&isCurrentMonth?'<div class="cell-dot"></div>':''}
    </div>`;
  }
  html += `</div></div>`;

  // Seçili gün detayı (tıklayınca burada gösterilir, sayfa değişmez)
  if (selectedMonthDay) {
    const dayDate = parseDate(selectedMonthDay);
    const dayPayments = getPaymentsForDate(dayDate);
    const dayTotal = dayPayments.reduce((s,p)=>s+p.amount,0);
    const dLabel = `${dayDate.getDate()} ${TR_MONTHS[dayDate.getMonth()]} ${dayDate.getFullYear()} · ${TR_DAYS_FULL[dayDate.getDay()]}`;
    html += `<div class="card" style="margin-top:8px;border-color:var(--accent)">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <div class="card-title" style="margin:0">${dLabel}</div>
        <span onclick="selectedMonthDay=null;render()" style="font-size:11px;color:var(--muted);cursor:pointer">✕ Kapat</span>
      </div>`;
    if (dayPayments.length === 0) {
      html += `<div style="text-align:center;padding:16px;color:var(--muted);font-size:12px">Bu gün için ödeme yok</div>`;
    } else {
      html += `<div style="font-size:12px;color:var(--yellow);font-weight:700;margin-bottom:8px">${fmt(dayTotal)} toplam</div>`;
      dayPayments.forEach(p => {
        const name = getPaymentName(p); const color = getPaymentColor(p);
        html += `<div class="payment-row" style="margin:4px 0" onclick="openEditPayment(${p.id})">
          <div class="dot ${p.status}"></div>
          <div class="supplier-avatar" style="background:${color}22;color:${color};width:30px;height:30px;font-size:10px;border-radius:7px">${supplierInitials(name)}</div>
          <div style="flex:1"><div style="font-size:12px;font-weight:700">${name}</div><div style="font-size:10px;color:var(--muted)">${p.note||'—'}</div></div>
          <div style="text-align:right"><div class="pamt" style="font-size:13px">${fmt(p.amount)}</div><span class="status-badge ${p.status}" style="font-size:9px">${p.status==='paid'?'Ödendi':'Bekliyor'}</span></div>
        </div>`;
      });
    }
    html += `<button class="btn btn-secondary" style="margin-top:8px" onclick="openAddPayment()">+ Bu Güne Ödeme Ekle</button>
    </div>`;
  }

  const monthPayments = DB.payments.filter(p=>{const d=parseDate(p.date);return d.getFullYear()===year&&d.getMonth()===month;});
  const monthTotal = monthPayments.reduce((s,p)=>s+p.amount,0);
  const monthPaid = monthPayments.filter(p=>p.status==='paid').reduce((s,p)=>s+p.amount,0);
  if (monthTotal>0) {
    html += `<div class="card" style="margin-top:8px">
      <div class="card-title">${label.toUpperCase()} TOPLAMI</div>
      <div style="display:flex;gap:20px">
        <div><div style="font-size:11px;color:var(--muted)">Toplam</div><div style="font-size:16px;font-weight:800;color:var(--yellow)">${fmt(monthTotal)}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Ödendi</div><div style="font-size:16px;font-weight:800;color:var(--green)">${fmt(monthPaid)}</div></div>
        <div><div style="font-size:11px;color:var(--muted)">Bekliyor</div><div style="font-size:16px;font-weight:800;color:var(--accent)">${fmt(monthTotal-monthPaid)}</div></div>
      </div>
    </div>`;
  }
  return html;
}

function renderPayments() {
  const sorted = [...DB.payments].sort((a,b)=>b.date.localeCompare(a.date));
  const unpaid = sorted.filter(p=>p.status==='unpaid'); const paid = sorted.filter(p=>p.status==='paid');
  let html = `<div class="section-lbl">Bekleyen (${unpaid.length}) · ${fmt(unpaid.reduce((s,p)=>s+p.amount,0))}</div>`;
  if (unpaid.length===0) html += `<div class="empty"><div class="empty-icon">✅</div><div class="empty-text">Bekleyen ödeme yok</div></div>`;
  else unpaid.forEach(p => { html += renderPaymentItem(p); });
  html += `<div class="section-lbl" style="margin-top:8px">Ödenenler (${paid.length}) · ${fmt(paid.reduce((s,p)=>s+p.amount,0))}</div>`;
  if (paid.length===0) html += `<div style="text-align:center;padding:16px;color:var(--muted);font-size:13px">Henüz ödeme yapılmadı</div>`;
  else paid.forEach(p => { html += renderPaymentItem(p); });
  return html;
}

function renderPaymentItem(p) {
  const name = getPaymentName(p); const color = getPaymentColor(p);
  const d = parseDate(p.date); const isFree = !p.supplier_id;
  const isOD = p.status==='unpaid' && p.date < dateStr(new Date());
  const paidAmt = p.paid_amount || 0;
  const isPartial = paidAmt > 0 && p.status === 'unpaid';
  const pct = p.amount > 0 ? Math.min(100, Math.round(paidAmt / p.amount * 100)) : 0;
  const remaining = p.amount - paidAmt;
  return `<div class="payment-row" onclick="openEditPayment(${p.id})">
    <div class="dot ${p.status}" style="${isOD && !isPartial?'background:var(--accent)':isPartial?'background:var(--yellow)':''}"></div>
    <div class="supplier-avatar" style="background:${color}22;color:${color};width:32px;height:32px;font-size:11px;border-radius:8px">${supplierInitials(name)}</div>
    <div style="flex:1">
      <div style="font-size:13px;font-weight:700">${name}${isFree?'<span class="tek-badge">tek seferlik</span>':''}</div>
      <div style="font-size:11px;color:var(--muted)">${p.note||'—'} · ${d.getDate()} ${TR_MONTHS[d.getMonth()]} ${d.getFullYear()}</div>
      ${isPartial ? `<div class="partial-bar-wrap"><div class="partial-bar"><div class="partial-fill" style="width:${pct}%"></div></div><div class="partial-info"><span class="partial-paid">↑${fmt(paidAmt)}</span><span class="partial-remaining">Kalan ${fmt(remaining)}</span></div></div>` : ''}
    </div>
    <div style="text-align:right">
      <div class="pamt">${fmt(isPartial ? remaining : p.amount)}</div>
      <span class="status-badge ${p.status}" style="${isPartial?'background:rgba(245,166,35,0.15);color:var(--yellow)':''}">${p.status==='paid'?'Ödendi':isPartial?'Kısmi':isOD?'GECİKMİŞ':'Bekliyor'}</span>
    </div>
  </div>`;
}

function openModal(html) {
  closeModal();
  const overlay = document.createElement('div');
  overlay.className = 'modal-overlay'; overlay.id = 'modal-overlay';
  overlay.onclick = e => { if (e.target===overlay) closeModal(); };
  overlay.innerHTML = `<div class="modal"><div class="modal-handle"></div>${html}</div>`;
  document.body.appendChild(overlay);
}
function closeModal() { const m = document.getElementById('modal-overlay'); if (m) m.remove(); }

const COLORS = ['#e94560','#0f9fd8','#f5a623','#00c896','#a855f7','#ec4899','#14b8a6','#f97316'];

function openAddSupplier() {

function toggleRecurring() {
  const cb = document.getElementById('f-recurring');
  const opts = document.getElementById('f-recurring-opts');
  opts.style.display = cb.checked ? 'block' : 'none';
  if (cb.checked) updateRecurringPreview();
}

function updateRecurringPreview() {
  const startDate = document.getElementById('f-date').value;
  const until = document.getElementById('f-until').value;
  const freq = document.getElementById('f-freq').value;
  const preview = document.getElementById('f-recurring-preview');
  if (!startDate || !until || !preview) return;
  const dates = generateRecurringDates(startDate, until, freq);
  if (dates.length === 0) { preview.textContent = 'Bitiş tarihi başlangıçtan önce olamaz'; return; }
  preview.textContent = `${dates.length} ödeme oluşturulacak (${formatDate(dates[0])} → ${formatDate(dates[dates.length-1])})`;
}

function formatDate(ds) {
  const d = parseDate(ds);
  return d.getDate() + ' ' + TR_MONTHS[d.getMonth()] + ' ' + d.getFullYear();
}

function generateRecurringDates(startStr, untilStr, freq) {
  const dates = [];
  const until = parseDate(untilStr);
  let current = parseDate(startStr);
  let safety = 0;
  while (current <= until && safety < 120) {
    dates.push(dateStr(current));
    const next = new Date(current);
    if (freq === 'monthly') { next.setMonth(next.getMonth() + 1); }
    else if (freq === 'weekly') { next.setDate(next.getDate() + 7); }
    else if (freq === 'biweekly') { next.setDate(next.getDate() + 14); }
    else if (freq === 'quarterly') { next.setMonth(next.getMonth() + 3); }
    current = next; safety++;
  }
  return dates;
}

async function saveNewPayment() {
  const suppSelect = document.getElementById('f-supp').value;
  const amt = parseFloat(document.getElementById('f-amt').value);
  const date = document.getElementById('f-date').value;
  if (!amt || !date) { showToast('Tutar ve tarih zorunlu'); return; }
  if (!suppSelect) { showToast('Tedarikçi seçin'); return; }

  let supplier_id = null; let free_supplier_name = null;

  if (suppSelect === '__new__') {
    const newName = (document.getElementById('f-free-name').value||'').trim();
    if (!newName) { showToast('Tedarikçi adı girin'); return; }
    const addToList = document.getElementById('f-add-cb').checked;
    if (addToList) {
      showLoading('Tedarikçi ekleniyor...');
      try {
        const res = await api.addSupplier({ name: newName, category: '', contact: '', total_debt: 0, paid: 0, color: COLORS[DB.suppliers.length % COLORS.length] });
        DB.suppliers.push(res[0]); supplier_id = res[0].id;
      } catch(e) { showToast('Hata: ' + e.message, 3000); hideLoading(); return; }
    } else { free_supplier_name = newName; }
  } else { supplier_id = parseInt(suppSelect); }

  const note = document.getElementById('f-note').value.trim();
  const isRecurring = document.getElementById('f-recurring') && document.getElementById('f-recurring').checked;

  if (isRecurring) {
    const until = document.getElementById('f-until').value;
    const freq = document.getElementById('f-freq').value;
    if (!until) { showToast('Bitiş tarihi zorunlu'); return; }
    const dates = generateRecurringDates(date, until, freq);
    if (dates.length === 0) { showToast('Geçerli tarih aralığı girin'); return; }
    if (dates.length > 60) { showToast('En fazla 60 tekrar oluşturulabilir'); return; }
    showLoading(`${dates.length} ödeme oluşturuluyor...`);
    try {
      for (const d of dates) {
        const res = await api.addPayment({ supplier_id, free_supplier_name, amount: amt, date: d, note, status: 'unpaid' });
        DB.payments.unshift(res[0]);
      }
      closeModal(); render(); showToast(`${dates.length} tekrarlayan ödeme eklendi ✓`);
    } catch(e) { showToast('Hata: ' + e.message, 3000); }
    finally { hideLoading(); }
  } else {
    showLoading('Kaydediliyor...');
    try {
      const res = await api.addPayment({ supplier_id, free_supplier_name, amount: amt, date, note, status: 'unpaid' });
      DB.payments.unshift(res[0]);
      closeModal(); render(); showToast('Ödeme eklendi ✓');
    } catch(e) { showToast('Hata: ' + e.message, 3000); }
    finally { hideLoading(); }
  }
}

async function saveEditPayment(id) {
  const p = DB.payments.find(x=>x.id==id);
  const suppSelect = document.getElementById('f-supp').value;
  const newAmt = parseFloat(document.getElementById('f-amt').value)||p.amount;
  const newStatus = document.getElementById('f-status').value;

  let supplier_id = null; let free_supplier_name = null;
  if (suppSelect==='__new__') {
    free_supplier_name = (document.getElementById('f-free-name').value||'').trim() || p.free_supplier_name;
  } else if (suppSelect) { supplier_id = parseInt(suppSelect); }

  // Borç güncelle — sadece listeli tedarikçilerde
  const supplierUpdates = {};
  if (p.status==='paid' && p.supplier_id) {
    const oldS = getSupplier(p.supplier_id);
    if (oldS) { oldS.paid = Math.max(0, oldS.paid - p.amount); supplierUpdates[p.supplier_id] = { paid: oldS.paid }; }
  }
  if (newStatus==='paid' && supplier_id) {
    const newS = getSupplier(supplier_id);
    if (newS) { newS.paid = Math.min(newS.total_debt, newS.paid + newAmt); supplierUpdates[supplier_id] = { paid: newS.paid }; }
  }

  showLoading('Güncelleniyor...');
  try {
    await api.updatePayment(id, { supplier_id, free_supplier_name, amount: newAmt, date: document.getElementById('f-date').value, note: document.getElementById('f-note').value.trim(), status: newStatus });
    for (const [sid, data] of Object.entries(supplierUpdates)) { await api.updateSupplier(sid, data); }
    Object.assign(p, { supplier_id, free_supplier_name, amount: newAmt, date: document.getElementById('f-date').value, note: document.getElementById('f-note').value.trim(), status: newStatus });
    closeModal(); render(); showToast(newStatus==='paid'?'Ödendi olarak işaretlendi ✓':'Güncellendi ✓');
  } catch(e) { showToast('Hata: ' + e.message, 3000); }
  finally { hideLoading(); }
}

async function deletePayment(id) {
  const p = DB.payments.find(x=>x.id==id);
  showLoading('Siliniyor...');
  try {
    if (p && p.status==='paid' && p.supplier_id) {
      const s = getSupplier(p.supplier_id);
      if (s) { s.paid = Math.max(0, s.paid - p.amount); await api.updateSupplier(p.supplier_id, { paid: s.paid }); }
    }
    await api.deletePayment(id);
    DB.payments = DB.payments.filter(x=>x.id!=id);
    closeModal(); render(); showToast('Silindi');
  } catch(e) { showToast('Hata: ' + e.message, 3000); }
  finally { hideLoading(); }
}

async function downloadReport(type) {
  const now = new Date();
  const dateLabel = now.toLocaleDateString('tr-TR').replace(/\./g, '-');
  const sheets = {};

  if (type === 'all' || type === 'suppliers') sheets['Tedarikci Borc Ozeti'] = buildSuppliersSheet();
  if (type === 'all' || type === 'payments') sheets['Odeme Takvimi'] = buildPaymentsSheet();
  if (type === 'all' || type === 'monthly') sheets['Aylik Ozet'] = buildMonthlySheet();
  if (type === 'all' || type === 'unpaid') sheets['Bekleyen Odemeler'] = buildUnpaidSheet();

  const labels = { all:'Tum-Raporlar', suppliers:'Tedarikci-Borc', payments:'Odeme-Takvimi', monthly:'Aylik-Ozet', unpaid:'Bekleyen-Odemeler' };
  const filename = `Tedarikci-Takip_${labels[type]}_${dateLabel}.xls`;
  await exportToXLS(sheets, filename);
}

function buildSuppliersSheet() {
  const rows = [
    ['Tedarikçi Adı','Kategori','Toplam Borç (₺)','Ödenen (₺)','Kalan (₺)','Ödeme %'],
  ];
  let totDebt=0, totPaid=0;
  DB.suppliers.forEach(s => {
    const kalan = s.total_debt - s.paid;
    const pct = s.total_debt > 0 ? Math.round(s.paid / s.total_debt * 100) : 0;
    rows.push([s.name, s.category||'', s.total_debt, s.paid, kalan, '%'+pct]);
    totDebt += s.total_debt; totPaid += s.paid;
  });
  rows.push(['']);
  rows.push(['TOPLAM','', totDebt, totPaid, totDebt-totPaid, totDebt>0?'%'+Math.round(totPaid/totDebt*100):'%0']);
  return rows;
}

function buildPaymentsSheet() {
  const rows = [['Tarih','Tedarikçi','Not','Tutar (₺)','Durum']];
  const sorted = [...DB.payments].sort((a,b)=>a.date.localeCompare(b.date));
  sorted.forEach(p => {
    const name = getPaymentName(p);
    const d = parseDate(p.date);
    const tarih = d.getDate()+' '+TR_MONTHS[d.getMonth()]+' '+d.getFullYear();
    const durum = p.status==='paid' ? 'Ödendi' : 'Bekliyor';
    rows.push([tarih, name, p.note||'', p.amount, durum]);
  });
  rows.push(['']);
  const total = DB.payments.reduce((s,p)=>s+p.amount,0);
  const paid = DB.payments.filter(p=>p.status==='paid').reduce((s,p)=>s+p.amount,0);
  rows.push(['TOPLAM','','',total,'']);
  rows.push(['Ödenen','','',paid,'']);
  rows.push(['Bekleyen','','',total-paid,'']);
  return rows;
}

function buildMonthlySheet() {
  const rows = [['Yıl','Ay','Toplam (₺)','Ödenen (₺)','Bekleyen (₺)','Ödeme Sayısı']];
  const map = {};
  DB.payments.forEach(p => {
    const d = parseDate(p.date);
    const key = d.getFullYear()+'-'+(d.getMonth()+1).toString().padStart(2,'0');
    if (!map[key]) map[key] = { year:d.getFullYear(), month:d.getMonth(), total:0, paid:0, count:0 };
    map[key].total += p.amount;
    if (p.status==='paid') map[key].paid += p.amount;
    map[key].count++;
  });
  Object.keys(map).sort().forEach(key => {
    const m = map[key];
    rows.push([String(m.year), TR_MONTHS[m.month], m.total, m.paid, m.total-m.paid, m.count]);
  });
  if (Object.keys(map).length === 0) rows.push(['Henüz veri yok','','','','','']);
  return rows;
}

function buildUnpaidSheet() {
  const rows = [['Tarih','Tedarikçi','Not','Tutar (₺)','Gecikme']];
  const today = dateStr(new Date());
  const unpaid = DB.payments.filter(p=>p.status==='unpaid').sort((a,b)=>a.date.localeCompare(b.date));
  unpaid.forEach(p => {
    const name = getPaymentName(p);
    const d = parseDate(p.date);
    const tarih = d.getDate()+' '+TR_MONTHS[d.getMonth()]+' '+d.getFullYear();
    const gecikme = p.date < today ? 'GECİKMİŞ' : 'Zamanında';
    rows.push([tarih, name, p.note||'', p.amount, gecikme]);
  });
  rows.push(['']);
  rows.push(['TOPLAM BEKLEYEN','','',unpaid.reduce((s,p)=>s+p.amount,0),'']);
  return rows;
}

async function exportToXLS(sheets, filename) {
  try {
    if (!window.XLSX) {
      showLoading('Excel kütüphanesi yükleniyor...');
      await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
      hideLoading();
    }
    const wb = XLSX.utils.book_new();
    Object.entries(sheets).forEach(([sheetName, rows]) => {
      if (!rows || rows.length === 0) return;
      const wsData = rows.map((row, ri) => row.map((cell, ci) => {
        if (cell === '' || cell === null || cell === undefined) return '';
        if (typeof cell === 'number') return cell;
        // Never parse first column or header row as number (years, labels, names)
        if (ri === 0 || ci === 0) return String(cell);
        const s = String(cell).replace(/[₺\s]/g,'').replace(/\./g,'').replace(',','.');
        if (!isNaN(parseFloat(s)) && s !== '' && !String(cell).startsWith('%') && /^[\d.,]+$/.test(String(cell).replace(/[₺\s]/g,''))) return parseFloat(s);
        return String(cell);
      }));
      const ws = XLSX.utils.aoa_to_sheet(wsData);
      ws['!cols'] = rows[0].map((_, ci) => ({ wch: Math.min(Math.max(...rows.map(r => String(r[ci]||'').length)) + 2, 40) }));
      const range = XLSX.utils.decode_range(ws['!ref'] || 'A1');
      for (let R = 1; R <= range.e.r; R++) {
        for (let C = 0; C <= range.e.c; C++) {
          const addr = XLSX.utils.encode_cell({r:R, c:C});
          if (ws[addr] && typeof ws[addr].v === 'number') ws[addr].z = '#,##0.00';
        }
      }
      XLSX.utils.book_append_sheet(wb, ws, sheetName.substring(0,31));
    });
    XLSX.writeFile(wb, filename.replace(/\.xls$/, '.xlsx'));
    showToast('Excel indirildi ✓');
  } catch(e) {
    showToast('Hata: ' + e.message, 4000);
    hideLoading();
  }
}



// ==================== EXCEL IMPORT ====================
let importData = null;

function openImportModal() {
  importData = null;
  openModal(`
  <div class="modal-title">📥 Excel'den İçe Aktar</div>
  <div style="font-size:12px;color:var(--muted);margin-bottom:14px">Uygulamadan indirdiğin Excel dosyasını yükle. Tedarikçi ve ödeme verileri aktarılır.</div>
  <div class="import-zone" onclick="document.getElementById('xls-input').click()">
    <input type="file" id="xls-input" accept=".xls,.xlsx,.csv" onchange="handleImportFile(this)">
    <div class="iz-icon">📂</div>
    <div class="iz-text">Dosya seç veya buraya sürükle</div>
    <div class="iz-sub">.xls / .xlsx / .csv</div>
  </div>
  <div id="import-preview-area"></div>
  <div id="import-mode-area" style="display:none">
    <div style="font-size:12px;color:var(--muted);margin-bottom:8px;font-weight:700">İçe aktarma modu:</div>
    <div class="import-opt">
      <div class="import-opt-btn selected" id="mode-merge" onclick="selectMode('merge')">➕ Sadece Yenileri Ekle<br><span style="font-size:10px;font-weight:400">Mevcut veriler korunur</span></div>
      <div class="import-opt-btn" id="mode-replace" onclick="selectMode('replace')">🔄 Sıfırla ve Yükle<br><span style="font-size:10px;font-weight:400;color:var(--accent)">Tüm veriler silinir</span></div>
    </div>
    <button class="btn btn-primary" style="background:var(--yellow);color:#000" onclick="executeImport()">İçe Aktar</button>
  </div>
  <button class="btn btn-secondary" onclick="closeModal()">İptal</button>`);

  // drag and drop
  const zone = document.querySelector('.import-zone');
  if (zone) {
    zone.addEventListener('dragover', e => { e.preventDefault(); zone.style.borderColor='var(--yellow)'; });
    zone.addEventListener('dragleave', () => { zone.style.borderColor=''; });
    zone.addEventListener('drop', e => { e.preventDefault(); zone.style.borderColor=''; if(e.dataTransfer.files[0]) handleImportFile({files: e.dataTransfer.files}); });
  }
}

let importMode = 'merge';
function selectMode(m) {
  importMode = m;
  document.getElementById('mode-merge').classList.toggle('selected', m==='merge');
  document.getElementById('mode-replace').classList.toggle('selected', m==='replace');
}

function handleImportFile(input) {
  const file = input.files[0]; if (!file) return;
  const ext = file.name.split('.').pop().toLowerCase();

  if (ext === 'csv') {
    const reader = new FileReader();
    reader.onload = e => parseCSV(e.target.result, file.name);
    reader.readAsText(file, 'UTF-8');
  } else {
    // XLS/XLSX — use SheetJS via CDN
    showLoading('Dosya okunuyor...');
    const reader = new FileReader();
    reader.onload = async e => {
      try {
        // Dynamically load SheetJS if not available
        if (!window.XLSX) {
          await loadScript('https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js');
        }
        const wb = XLSX.read(e.target.result, { type: 'array' });
        parseXLSX(wb, file.name);
      } catch(err) {
        showToast('Dosya okunamadı: ' + err.message, 4000);
      } finally { hideLoading(); }
    };
    reader.readAsArrayBuffer(file);
    hideLoading();
  }
}

function loadScript(src) {
  return new Promise((resolve, reject) => {
    const s = document.createElement('script');
    s.src = src; s.onload = resolve; s.onerror = reject;
    document.head.appendChild(s);
  });
}

function parseXLSX(wb, filename) {
  const result = { suppliers: [], payments: [], filename };
  const TR_MONTH_MAP = { 'Ocak':1,'Şubat':2,'Mart':3,'Nisan':4,'Mayıs':5,'Haziran':6,'Temmuz':7,'Ağustos':8,'Eylül':9,'Ekim':10,'Kasım':11,'Aralık':12 };

  wb.SheetNames.forEach(name => {
    const sheet = wb.Sheets[name];
    const rows = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: '' });
    if (rows.length < 2) return;
    const header = rows[0].map(h => String(h).trim().toLowerCase());

    // Tedarikçi sekmesi
    if (header.includes('tedarikçi adı') || header.includes('tedarikci adi') || name.toLowerCase().includes('tedarik')) {
      const ni = header.findIndex(h=>h.includes('tedarikç') || h.includes('tedarikc'));
      const ci = header.findIndex(h=>h.includes('kategori'));
      const di = header.findIndex(h=>h.includes('toplam'));
      const pi = header.findIndex(h=>h.includes('ödenen') || h.includes('odenen'));
      for (let r=1; r<rows.length; r++) {
        const row = rows[r];
        const n = String(row[ni]||'').trim();
        if (!n || n.toUpperCase()===n && n.length>3) continue; // skip totals
        const debt = parseFloat(String(row[di]||'0').replace(/[^\d.,-]/g,'').replace(',','.')) || 0;
        const paid = parseFloat(String(row[pi]||'0').replace(/[^\d.,-]/g,'').replace(',','.')) || 0;
        result.suppliers.push({ name: n, category: String(row[ci]||'').trim(), total_debt: debt, paid: paid });
      }
    }

    // Ödeme sekmesi
    if (header.includes('tarih') && (header.includes('tutar (₺)') || header.includes('tutar'))) {
      const ti = header.findIndex(h=>h==='tarih');
      const ni = header.findIndex(h=>h.includes('tedarikç') || h.includes('tedarikc'));
      const nti = header.findIndex(h=>h.includes('not'));
      const ai = header.findIndex(h=>h.includes('tutar'));
      const si = header.findIndex(h=>h.includes('durum'));
      for (let r=1; r<rows.length; r++) {
        const row = rows[r];
        const rawDate = String(row[ti]||'').trim();
        if (!rawDate) continue;
        // Parse "24 Haziran 2026" format
        let dateStr = '';
        const parts = rawDate.split(' ');
        if (parts.length === 3 && TR_MONTH_MAP[parts[1]]) {
          const m = String(TR_MONTH_MAP[parts[1]]).padStart(2,'0');
          const d2 = String(parts[0]).padStart(2,'0');
          dateStr = `${parts[2]}-${m}-${d2}`;
        } else if (rawDate.match(/\d{4}-\d{2}-\d{2}/)) {
          dateStr = rawDate.substring(0,10);
        }
        if (!dateStr) continue;
        const amt = parseFloat(String(row[ai]||'0').replace(/[^\d.,-]/g,'').replace(',','.')) || 0;
        if (!amt) continue;
        const suppName = String(row[ni]||'').trim();
        const durum = String(row[si]||'').trim();
        const status = durum.includes('Ödendi') || durum.includes('odendi') ? 'paid' : 'unpaid';
        result.payments.push({ supplier_name: suppName, note: String(row[nti]||'').trim(), amount: amt, date: dateStr, status });
      }
    }
  });

  showImportPreview(result);
}

function parseCSV(text, filename) {
  showToast('CSV için önce Excel formatında indirmenizi öneririz', 3000);
}

function showImportPreview(result) {
  importData = result;
  const area = document.getElementById('import-preview-area');
  const modeArea = document.getElementById('import-mode-area');
  if (!area || !modeArea) return;

  if (result.suppliers.length === 0 && result.payments.length === 0) {
    area.innerHTML = `<div style="background:rgba(233,69,96,0.1);border:1px solid var(--accent);border-radius:10px;padding:12px;font-size:12px;color:var(--accent);margin-bottom:12px">⚠️ Dosyada tanınan veri bulunamadı. Uygulamadan indirilen Excel dosyası olduğundan emin ol.</div>`;
    modeArea.style.display = 'none';
    return;
  }

  area.innerHTML = `
  <div class="import-preview">
    <div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:8px">📄 ${result.filename}</div>
    <div class="ip-row"><span class="ip-label">Tedarikçi</span><span class="ip-val" style="color:var(--green)">${result.suppliers.length} kayıt</span></div>
    <div class="ip-row"><span class="ip-label">Ödeme</span><span class="ip-val" style="color:var(--yellow)">${result.payments.length} kayıt</span></div>
  </div>`;
  modeArea.style.display = 'block';
}

async function executeImport() {
  if (!importData) return;
  const COLORS_LIST = ['#e94560','#0f9fd8','#f5a623','#00c896','#a855f7','#ec4899','#14b8a6','#f97316'];

  showLoading('İçe aktarılıyor...');
  try {
    if (importMode === 'replace') {
      // Delete all existing first
      await sbFetch('payments?id=gt.0', { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
      await sbFetch('suppliers?id=gt.0', { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
      DB.suppliers = []; DB.payments = [];
    }

    // Import suppliers
    let addedS = 0;
    for (const s of importData.suppliers) {
      if (importMode === 'merge') {
        const exists = DB.suppliers.find(x => x.name.toLowerCase() === s.name.toLowerCase());
        if (exists) continue;
      }
      const color = COLORS_LIST[(DB.suppliers.length) % COLORS_LIST.length];
      const res = await api.addSupplier({ name: s.name, category: s.category||'', contact: '', total_debt: s.total_debt, paid: s.paid, color });
      DB.suppliers.push(res[0]); addedS++;
    }

    // Import payments — match supplier names to IDs
    let addedP = 0;
    for (const p of importData.payments) {
      const sup = DB.suppliers.find(x => x.name.toLowerCase() === (p.supplier_name||'').toLowerCase());
      const isFree = !sup && p.supplier_name;
      const payload = {
        supplier_id: sup ? sup.id : null,
        free_supplier_name: isFree ? p.supplier_name : null,
        amount: p.amount, date: p.date,
        note: p.note||'', status: p.status||'unpaid'
      };
      const res = await api.addPayment(payload);
      DB.payments.unshift(res[0]); addedP++;
    }

    closeModal(); render();
    showToast(`✓ ${addedS} tedarikçi, ${addedP} ödeme aktarıldı`, 3000);
  } catch(e) {
    showToast('Hata: ' + e.message, 4000);
  } finally { hideLoading(); }
}


// ==================== PARTIAL PAYMENT ====================
function openPartialPayment(id) {
  const p = DB.payments.find(x=>x.id==id); if (!p) return;
  const name = getPaymentName(p);
  closeModal();
  openModal(`
  <div class="modal-title">💰 Kısmi Ödeme</div>
  <div class="card" style="margin:0 0 14px;padding:12px">
    <div style="font-size:13px;font-weight:700;margin-bottom:6px">${name}</div>
    <div style="display:flex;justify-content:space-between;align-items:center">
      <span style="font-size:12px;color:var(--muted)">Mevcut tutar</span>
      <span style="font-size:18px;font-weight:800;color:var(--accent)">${fmt(p.amount)}</span>
    </div>
  </div>
  <div class="form-group">
    <label class="form-label">Ödenen miktar (₺)</label>
    <input class="form-input" id="p-amt" type="number" inputmode="numeric" placeholder="0"
      oninput="updatePartialPreview(${p.amount})">
  </div>
  <div id="p-preview" style="font-size:13px;min-height:24px;margin-bottom:14px;padding:0 2px"></div>
  <button class="btn btn-primary" onclick="savePartialPayment(${id})">Kaydet</button>
  <button class="btn btn-secondary" onclick="closeModal()">İptal</button>`);
}


function updatePartialPreview(total) {
  const val = parseFloat(document.getElementById('p-amt').value) || 0;
  const preview = document.getElementById('p-preview');
  if (!preview) return;
  if (val <= 0) { preview.innerHTML = ''; return; }
  if (val > total) {
    preview.innerHTML = '<span style="color:var(--accent)">⚠ Toplam tutardan fazla girilemez</span>';
    return;
  }
  const remaining = total - val;
  if (remaining === 0) {
    preview.innerHTML = '<span style="color:var(--green)">✓ Ödeme tamamen kapanacak</span>';
  } else {
    preview.innerHTML = `Kayıt <b style="color:var(--accent)">${fmt(remaining)}</b> olarak güncellenecek`;
  }
}


async function savePartialPayment(id) {
  const p = DB.payments.find(x=>x.id==id); if (!p) return;
  const val = parseFloat(document.getElementById('p-amt').value) || 0;
  if (!val || val <= 0) { showToast('Tutar girin'); return; }
  if (val > p.amount) { showToast('Ödenen tutar, toplam tutardan fazla olamaz'); return; }
  const newAmount = p.amount - val;
  const isFullyPaid = newAmount <= 0;
  const updates = isFullyPaid
    ? { amount: p.amount, paid_amount: p.amount, status: 'paid' }
    : { amount: newAmount };

  // Her durumda tedarikçi borcundan ödenen miktar düşülsün
  if (p.supplier_id) {
    const s = getSupplier(p.supplier_id);
    if (s) {
      s.paid = Math.min(s.total_debt, s.paid + val);
      await api.updateSupplier(p.supplier_id, { paid: s.paid });
    }
  }

  showLoading('Kaydediliyor...');
  try {
    await api.updatePayment(id, updates);
    const msg = isFullyPaid ? 'Ödeme tamamlandı ✓' : `${fmt(val)} düşüldü, kalan tutar: ${fmt(newAmount)} ✓`;
    closeModal();
    await loadAll();
    showToast(msg, 3000);
  } catch(e) { showToast('Hata: ' + e.message, 3000); }
  finally { hideLoading(); }
}

  <div style="background:rgba(233,69,96,0.1);border:1px solid var(--accent);border-radius:10px;padding:14px;margin-bottom:16px">
    <div style="font-size:13px;color:var(--text);line-height:1.6">
      Bu işlem <b>geri alınamaz</b>. Şunlar silinecek:
      <ul style="margin:8px 0 0 18px;padding:0;font-size:12px;color:var(--muted)">
        <li>Tüm tedarikçiler (${DB.suppliers.length} kayıt)</li>
        <li>Tüm ödemeler (${DB.payments.length} kayıt)</li>
      </ul>
    </div>
  </div>
  <div style="font-size:11px;color:var(--muted);margin-bottom:8px">💡 Önce <b>📊 Rapor</b> butonundan yedek almanı öneririz.</div>
  <div class="form-group">
    <label class="form-label">Onaylamak için <b style="color:var(--accent)">SİL</b> yaz</label>
    <input class="form-input" id="reset-confirm" placeholder="SİL" type="text" oninput="checkResetConfirm()" style="text-transform:uppercase">
  </div>
  <button class="btn btn-danger" id="reset-confirm-btn" onclick="executeFullReset()" disabled style="opacity:0.4;cursor:not-allowed">Her Şeyi Sil</button>
  <button class="btn btn-secondary" onclick="closeModal()">İptal</button>`);
}

function checkResetConfirm() {
  const val = document.getElementById('reset-confirm').value.trim().toUpperCase();
  const btn = document.getElementById('reset-confirm-btn');
  if (val === 'SİL' || val === 'SIL') {
    btn.disabled = false; btn.style.opacity = '1'; btn.style.cursor = 'pointer';
  } else {
    btn.disabled = true; btn.style.opacity = '0.4'; btn.style.cursor = 'not-allowed';
  }
}

async function executeFullReset() {
  showLoading('Tüm veriler siliniyor...');
  try {
    await sbFetch('payments?id=gt.0', { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
    await sbFetch('suppliers?id=gt.0', { method: 'DELETE', headers: { 'Prefer': 'return=minimal' } });
    DB.suppliers = []; DB.payments = [];
    selectedSupplierId = null; selectedMonthDay = null;
    closeModal(); render();
    showToast('Tüm veriler silindi', 3000);
  } catch(e) { showToast('Hata: ' + e.message, 4000); }
  finally { hideLoading(); }
}
